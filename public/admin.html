<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KQueue — Admin</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>

<body>

    <nav class="topbar">
        <a class="logo" href="/">
            KQueue
        </a>
        <div style="display:flex;gap:8px;align-items:center">
            <a href="/" class="btn btn-ghost btn-sm" target="_blank">
                <i data-lucide="external-link" width="12" height="12"></i> หน้าสาธารณะ
            </a>
            <button class="btn btn-danger btn-sm" onclick="logout()">
                <i data-lucide="log-out" width="12" height="12"></i> ออก
            </button>
        </div>
    </nav>

    <div class="wrap-lg" style="padding-top:20px;padding-bottom:40px">

        <!-- ANNOUNCEMENT -->
        <div class="card" style="margin-bottom:16px;border-color:var(--border-2)">
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
                <i data-lucide="megaphone" width="15" height="15" style="color:var(--orange);flex-shrink:0"></i>
                <input id="annInput" type="text" placeholder="พิมพ์ประกาศที่ต้องการให้ผู้จองคิวเห็น"
                    style="flex:1;min-width:160px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;color:var(--text);font-family:inherit;font-size:13px;outline:none;" />
                <button class="btn btn-warning btn-sm" onclick="postAnnouncement()">
                    <i data-lucide="send" width="12" height="12"></i> ประกาศ
                </button>
                <button class="btn btn-ghost btn-sm" onclick="clearAnnouncement()" id="annClearBtn"
                    style="display:none">
                    <i data-lucide="x" width="12" height="12"></i> ลบประกาศ
                </button>
            </div>
            <div id="annPreview"
                style="display:none;margin-top:8px;padding:8px 10px;background:var(--bg);border-radius:var(--radius);font-size:12px;color:var(--orange);border:1px solid #f59e0b20">
                <i data-lucide="info" width="11" height="11"></i>
                <span id="annPreviewText"></span>
            </div>
        </div>

        <!-- STATS -->
        <div class="stats">
            <div class="stat">
                <div class="stat-n" id="sP" style="color:var(--orange)">—</div>
                <div class="stat-l">รออนุมัติ</div>
            </div>
            <div class="stat">
                <div class="stat-n" id="sA" style="color:var(--blue)">—</div>
                <div class="stat-l">ในคิว</div>
            </div>
            <div class="stat">
                <div class="stat-n" id="sI" style="color:var(--purple)">—</div>
                <div class="stat-l">กำลังทำ</div>
            </div>
            <div class="stat">
                <div class="stat-n" id="sD" style="color:var(--green)">—</div>
                <div class="stat-l">เสร็จแล้ว</div>
            </div>
        </div>

        <!-- TABS -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('pending',this)" id="tabPending">
                <i data-lucide="bell" width="13" height="13"></i>
                รออนุมัติ
                <span class="tab-count" id="pendingCount" style="display:none">0</span>
            </button>
            <button class="tab" onclick="switchTab('queue',this)">
                <i data-lucide="list" width="13" height="13"></i>
                คิวงาน
            </button>
            <button class="tab" onclick="switchTab('done',this)">
                <i data-lucide="check-circle" width="13" height="13"></i>
                เสร็จแล้ว
            </button>
            <button class="tab" onclick="switchTab('add',this)">
                <i data-lucide="plus" width="13" height="13"></i>
                เพิ่มเอง
            </button>
        </div>

        <!-- TAB: PENDING -->
        <div id="tab-pending">
            <div id="pLoad" style="padding:32px;text-align:center">
                <div class="spinner" style="border-color:#6366f115;border-top-color:var(--accent);margin:0 auto"></div>
            </div>
            <div id="pEmpty" class="empty hidden">
                <i data-lucide="inbox" width="28" height="28"></i>
                <p>ว่างดีเลย ไม่มีคำขอใหม่</p>
            </div>
            <div id="pList"></div>
        </div>

        <!-- TAB: QUEUE -->
        <div id="tab-queue" class="hidden">
            <div id="qLoad" style="padding:32px;text-align:center">
                <div class="spinner" style="border-color:#6366f115;border-top-color:var(--accent);margin:0 auto"></div>
            </div>
            <div id="qEmpty" class="empty hidden">
                <i data-lucide="layers" width="28" height="28"></i>
                <p>คิวว่างอยู่</p>
            </div>
            <div id="qHint" class="hidden"
                style="font-size:11px;color:var(--text-3);margin-bottom:10px;display:flex;align-items:center;gap:4px">
                <i data-lucide="info" width="11" height="11"></i> ใช้ปุ่ม ↑↓ เพื่อเรียงลำดับ หรือลากได้เหมือนกัน
            </div>
            <div id="qList"></div>
        </div>

        <!-- TAB: DONE -->
        <div id="tab-done" class="hidden">
            <div id="dLoad" style="padding:32px;text-align:center">
                <div class="spinner" style="border-color:#6366f115;border-top-color:var(--accent);margin:0 auto"></div>
            </div>
            <div id="dEmpty" class="empty hidden">
                <i data-lucide="archive" width="28" height="28"></i>
                <p>ยังไม่มีงานเสร็จ</p>
            </div>
            <div id="dList"></div>
        </div>

        <!-- TAB: ADD -->
        <div id="tab-add" class="hidden">
            <div class="card">
                <div class="card-head">
                    <div class="card-title">
                        <i data-lucide="plus-circle" width="15" height="15"></i>
                        เพิ่มงานเอง
                    </div>
                    <span style="font-size:11px;color:var(--text-3)">ข้ามการอนุมัติ เข้าคิวทันที</span>
                </div>
                <form id="addForm" novalidate>
                    <div class="row2">
                        <div class="fg">
                            <label>ชื่อโครงงาน <span class="req">*</span></label>
                            <input id="a-name" type="text" required placeholder="ชื่อโครงงาน" />
                        </div>
                        <div class="fg">
                            <label>บอร์ด</label>
                            <select id="a-board">
                                <option value="ESP32">ESP32</option>
                                <option value="ESP8266">ESP8266</option>
                                <option value="Arduino">Arduino</option>
                                <option value="Raspberry Pi">Raspberry Pi</option>
                                <option value="Other">อื่นๆ</option>
                            </select>
                        </div>
                    </div>
                    <div class="row2">
                        <div class="fg">
                            <label>ชื่อเล่น</label>
                            <input id="a-nick" type="text" placeholder="เช่น ก้อง, มิ้น" />
                        </div>
                        <div class="fg">
                            <label>ห้องเรียน</label>
                            <input id="a-class" type="text" placeholder="เช่น ม.5/2, ปวช.2/1" />
                        </div>
                    </div>
                    <div class="fg">
                        <label>รายละเอียด <span class="req">*</span></label>
                        <textarea id="a-feat" rows="3" required placeholder="อธิบายงาน"></textarea>
                    </div>
                    <div class="row2">
                        <div class="fg">
                            <label>ช่องทางติดต่อ</label>
                            <select id="a-ctype">
                                <option value="Instagram">Instagram</option>
                                <option value="Line">Line</option>
                                <option value="Facebook">Facebook</option>
                                <option value="Phone">โทรศัพท์</option>
                                <option value="Email">Email</option>
                                <option value="Other">อื่นๆ</option>
                            </select>
                        </div>
                        <div class="fg">
                            <label>ID / เบอร์ <span class="req">*</span></label>
                            <input id="a-con" type="text" required placeholder="ช่องทางติดต่อ" />
                        </div>
                    </div>
                    <div class="row2">
                        <div class="fg">
                            <label>งบ</label>
                            <input id="a-budget" type="text" placeholder="เช่น 300-500 บาท" />
                        </div>
                        <div class="fg">
                            <label>กำหนดส่ง</label>
                            <input id="a-dead" type="date" />
                        </div>
                    </div>
                    <div class="fg">
                        <label>หมายเหตุ</label>
                        <textarea id="a-notes" rows="2" placeholder="หมายเหตุ"></textarea>
                    </div>
                    <div id="addErr" class="err-msg hidden">
                        <i data-lucide="alert-circle" width="13" height="13"></i>
                        <span id="addErrTxt"></span>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full" id="addBtn">
                        <i data-lucide="plus" width="14" height="14" id="addIcon"></i>
                        <span id="addTxt">เพิ่มเข้าคิว</span>
                        <span id="addSpin" class="spinner hidden"></span>
                    </button>
                </form>
            </div>
        </div>

    </div><!-- /wrap-lg -->

    <div class="toast-wrap" id="toastWrap"></div>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = '/login';

        let dragSrc = null;

        function auth() {
            return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
        }
        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = '/login';
        }

        // ── TOAST ──────────────────────────────────────────
        function toast(msg, ok = true) {
            const el = document.createElement('div');
            el.className = `toast ${ok ? 'ok' : 'err'}`;
            el.innerHTML = `<i data-lucide="${ok ? 'check' : 'x'}" width="14" height="14"></i><span>${msg}</span>`;
            document.getElementById('toastWrap').appendChild(el);
            lucide.createIcons();
            setTimeout(() => el.remove(), 3000);
        }

        // ── TABS ────────────────────────────────────────────
        function switchTab(tab, btn) {
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            btn.classList.add('active');
            if (tab === 'pending') loadPending();
            else if (tab === 'queue') loadQueue();
            else if (tab === 'done') loadDone();
        }

        // ── STATS ───────────────────────────────────────────
        async function loadStats() {
            try {
                const r = await fetch('/api/queue/stats', { headers: auth() });
                if (r.status === 403) { logout(); return; }
                const d = await r.json();
                document.getElementById('sP').textContent = d.pending;
                document.getElementById('sA').textContent = d.approved;
                document.getElementById('sI').textContent = d.inProgress;
                document.getElementById('sD').textContent = d.done;
                const cnt = document.getElementById('pendingCount');
                if (d.pending > 0) { cnt.textContent = d.pending; cnt.style.display = 'inline-flex'; }
                else cnt.style.display = 'none';
            } catch { }
        }

        // ── PENDING ─────────────────────────────────────────
        async function loadPending() {
            const load = document.getElementById('pLoad');
            const empty = document.getElementById('pEmpty');
            const list = document.getElementById('pList');
            load.classList.remove('hidden'); empty.classList.add('hidden'); list.innerHTML = '';

            try {
                const r = await fetch('/api/queue/pending', { headers: auth() });
                const data = await r.json();
                load.classList.add('hidden');
                if (!data.length) { empty.classList.remove('hidden'); lucide.createIcons(); return; }

                list.innerHTML = data.map(item => `
      <div class="q-item" id="pi-${item._id}">
        <div class="q-top">
          <div style="flex:1;min-width:0">
            <div class="q-name">${esc(item.projectName)}</div>
            <div class="q-meta">
              <span><i data-lucide="cpu" width="11" height="11"></i>${esc(item.boardType)}</span>
              <span><i data-lucide="message-circle" width="11" height="11"></i>${esc(item.contactType)}</span>
              ${item.budget ? `<span><i data-lucide="banknote" width="11" height="11"></i>${esc(item.budget)}</span>` : ''}
              ${item.deadline ? `<span><i data-lucide="calendar" width="11" height="11"></i>${item.deadline}</span>` : ''}
              <span><i data-lucide="clock" width="11" height="11"></i>${relTime(item.createdAt)}</span>
            </div>
          </div>
          <div class="q-actions">
            <button class="btn btn-ghost btn-sm" onclick="toggleDet('pd-${item._id}')">
              <i data-lucide="eye" width="12" height="12"></i>
            </button>
            <button class="btn btn-success btn-sm" onclick="approve('${item._id}')">
              <i data-lucide="check" width="12" height="12"></i> อนุมัติ
            </button>
            <button class="btn btn-danger btn-sm" onclick="reject('${item._id}')">
              <i data-lucide="x" width="12" height="12"></i> ปฏิเสธ
            </button>
          </div>
        </div>
        <div class="q-detail" id="pd-${item._id}">
          <table>
            <tr><td>โครงงาน</td><td>${esc(item.projectName)}</td></tr>
            ${item.nickname ? `<tr><td>ชื่อเล่น</td><td>${esc(item.nickname)}</td></tr>` : ''}
            ${item.classroom ? `<tr><td>ห้อง</td><td>${esc(item.classroom)}</td></tr>` : ''}
            <tr><td>บอร์ด</td><td>${esc(item.boardType)}</td></tr>
            <tr><td>รายละเอียด</td><td style="white-space:pre-wrap">${esc(item.features)}</td></tr>
            <tr><td>ติดต่อ</td><td>${esc(item.contactType)}: ${esc(item.contact)}</td></tr>
            ${item.budget ? `<tr><td>งบ</td><td>${esc(item.budget)}</td></tr>` : ''}
            ${item.deadline ? `<tr><td>กำหนดส่ง</td><td>${item.deadline}</td></tr>` : ''}
            ${item.notes ? `<tr><td>หมายเหตุ</td><td style="white-space:pre-wrap">${esc(item.notes)}</td></tr>` : ''}
          </table>
        </div>
      </div>
    `).join('');
                lucide.createIcons();
            } catch { load.classList.add('hidden'); }
        }

        async function approve(id) {
            try {
                const r = await fetch(`/api/queue/${id}/approve`, { method: 'PATCH', headers: auth() });
                if (!r.ok) throw new Error();
                document.getElementById(`pi-${id}`)?.remove();
                toast('อนุมัติแล้ว');
                loadStats();
            } catch { toast('เกิดข้อผิดพลาด', false); }
        }

        async function reject(id) {
            if (!confirm('ปฏิเสธคำขอนี้?')) return;
            try {
                const r = await fetch(`/api/queue/${id}/reject`, { method: 'PATCH', headers: auth() });
                if (!r.ok) throw new Error();
                document.getElementById(`pi-${id}`)?.remove();
                toast('ปฏิเสธแล้ว');
                loadStats();
            } catch { toast('เกิดข้อผิดพลาด', false); }
        }

        // ── QUEUE ───────────────────────────────────────────
        async function loadQueue() {
            const load = document.getElementById('qLoad');
            const empty = document.getElementById('qEmpty');
            const hint = document.getElementById('qHint');
            const list = document.getElementById('qList');
            load.classList.remove('hidden'); empty.classList.add('hidden');
            hint.classList.add('hidden'); list.innerHTML = '';

            try {
                const r = await fetch('/api/queue', { headers: auth() });
                const data = await r.json();
                load.classList.add('hidden');
                const active = data.filter(d => d.status !== 'done');
                if (!active.length) { empty.classList.remove('hidden'); lucide.createIcons(); return; }
                hint.classList.remove('hidden');

                list.innerHTML = active.map((item, i) => `
      <div class="q-item" draggable="true" data-id="${item._id}" id="qi-${item._id}">
        <div class="q-top">
          <div style="display:flex;flex-direction:column;gap:2px;flex-shrink:0">
            <button class="btn btn-ghost btn-sm" style="padding:2px 5px;" onclick="moveItem('${item._id}',-1)" title="เลื่อนขึ้น">
              <i data-lucide="chevron-up" width="13" height="13"></i>
            </button>
            <button class="btn btn-ghost btn-sm" style="padding:2px 5px;" onclick="moveItem('${item._id}',1)" title="เลื่อนลง">
              <i data-lucide="chevron-down" width="13" height="13"></i>
            </button>
          </div>
          <div class="q-num">${i + 1}</div>
          <div style="flex:1;min-width:0">
            <div class="q-name">${esc(item.projectName)}</div>
            <div class="q-meta">
              <span><i data-lucide="cpu" width="11" height="11"></i>${esc(item.boardType)}</span>
              ${statusBadge(item.status)}
            </div>
          </div>
          <div class="q-actions">
            <button class="btn btn-ghost btn-sm" onclick="toggleDet('qd-${item._id}')">
              <i data-lucide="eye" width="12" height="12"></i>
            </button>
            ${item.status === 'approved' || item.status === 'in_progress' ? `
            <button class="btn btn-warning btn-sm" onclick="setStatus('${item._id}','waiting_parts')">
              <i data-lucide="package" width="12" height="12"></i> รออุปกรณ์
            </button>` : ''}
            ${item.status === 'approved' || item.status === 'waiting_parts' ? `
            <button class="btn btn-primary btn-sm" onclick="setStatus('${item._id}','in_progress')">
              <i data-lucide="play" width="12" height="12"></i> เริ่ม
            </button>` : ''}
            ${item.status === 'in_progress' ? `
            <button class="btn btn-success btn-sm" onclick="setStatus('${item._id}','done')">
              <i data-lucide="check" width="12" height="12"></i> เสร็จ
            </button>` : ''}
            <button class="btn btn-danger btn-sm" onclick="del('${item._id}')">
              <i data-lucide="trash-2" width="12" height="12"></i>
            </button>
          </div>
        </div>
        <div class="q-detail" id="qd-${item._id}">
          <table>
            ${item.nickname ? `<tr><td>ชื่อเล่น</td><td>${esc(item.nickname)}</td></tr>` : ''}
            ${item.classroom ? `<tr><td>ห้อง</td><td>${esc(item.classroom)}</td></tr>` : ''}
            <tr><td>รายละเอียด</td><td style="white-space:pre-wrap">${esc(item.features)}</td></tr>
            <tr><td>ติดต่อ</td><td>${esc(item.contactType)}: ${esc(item.contact)}</td></tr>
            ${item.budget ? `<tr><td>งบ</td><td>${esc(item.budget)}</td></tr>` : ''}
            ${item.deadline ? `<tr><td>กำหนดส่ง</td><td>${item.deadline}</td></tr>` : ''}
            ${item.notes ? `<tr><td>หมายเหตุ</td><td style="white-space:pre-wrap">${esc(item.notes)}</td></tr>` : ''}
          </table>
        </div>
      </div>
    `).join('');
                initDrag();
                lucide.createIcons();
            } catch { load.classList.add('hidden'); }
        }

        async function setStatus(id, status) {
            try {
                const r = await fetch(`/api/queue/${id}/status`, { method: 'PATCH', headers: auth(), body: JSON.stringify({ status }) });
                if (!r.ok) throw new Error();
                const labels = { waiting_parts: 'ตั้งสถานะเป็นรออุปกรณ์', in_progress: 'เริ่มทำงานแล้ว', done: 'ทำเสร็จแล้ว' };
                toast(labels[status] || 'อัปเดตแล้ว');
                loadQueue(); loadStats();
            } catch { toast('เกิดข้อผิดพลาด', false); }
        }

        async function revertDone(id, status) {
            try {
                const r = await fetch(`/api/queue/${id}/status`, { method: 'PATCH', headers: auth(), body: JSON.stringify({ status }) });
                if (!r.ok) throw new Error();
                toast('ย้ายกลับเข้าคิวแล้ว');
                loadDone(); loadQueue(); loadStats();
            } catch { toast('เกิดข้อผิดพลาด', false); }
        }

        async function del(id) {
            if (!confirm('ลบออกจากคิว?')) return;
            try {
                const r = await fetch(`/api/queue/${id}`, { method: 'DELETE', headers: auth() });
                if (!r.ok) throw new Error();
                toast('ลบแล้ว');
                loadQueue(); loadStats();
            } catch { toast('เกิดข้อผิดพลาด', false); }
        }

        // ── DONE ────────────────────────────────────────────
        async function loadDone() {
            const load = document.getElementById('dLoad');
            const empty = document.getElementById('dEmpty');
            const list = document.getElementById('dList');
            load.classList.remove('hidden'); empty.classList.add('hidden'); list.innerHTML = '';

            try {
                const r = await fetch('/api/queue', { headers: auth() });
                const data = await r.json();
                load.classList.add('hidden');
                const done = data.filter(d => d.status === 'done');
                if (!done.length) { empty.classList.remove('hidden'); lucide.createIcons(); return; }

                list.innerHTML = done.map(item => `
      <div class="q-item" style="opacity:0.8">
        <div class="q-top">
          <div style="flex:1;min-width:0">
            <div class="q-name">${esc(item.projectName)}</div>
            <div class="q-meta">
              <span><i data-lucide="cpu" width="11" height="11"></i>${esc(item.boardType)}</span>
              <span class="badge b-done"><i data-lucide="check" width="10" height="10"></i> เสร็จ</span>
              <span><i data-lucide="clock" width="11" height="11"></i>${relTime(item.updatedAt)}</span>
            </div>
          </div>
          <div class="q-actions">
            <button class="btn btn-warning btn-sm" onclick="revertDone('${item._id}','waiting_parts')">
              <i data-lucide="package" width="12" height="12"></i> รออุปกรณ์
            </button>
            <button class="btn btn-primary btn-sm" onclick="revertDone('${item._id}','in_progress')">
              <i data-lucide="rotate-ccw" width="12" height="12"></i> กลับทำ
            </button>
            <button class="btn btn-danger btn-sm" onclick="del('${item._id}')">
              <i data-lucide="trash-2" width="12" height="12"></i>
            </button>
          </div>
        </div>
      </div>
    `).join('');
                lucide.createIcons();
            } catch { load.classList.add('hidden'); }
        }

        // ── DRAG & DROP ─────────────────────────────────────
        function initDrag() {
            document.querySelectorAll('#qList .q-item').forEach(el => {
                el.addEventListener('dragstart', e => { dragSrc = el; el.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
                el.addEventListener('dragend', () => { el.classList.remove('dragging'); document.querySelectorAll('#qList .q-item').forEach(i => i.classList.remove('drag-over')); saveOrder(); });
                el.addEventListener('dragover', e => { e.preventDefault(); });
                el.addEventListener('dragenter', e => { e.preventDefault(); if (el !== dragSrc) el.classList.add('drag-over'); });
                el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
                el.addEventListener('drop', e => {
                    e.preventDefault();
                    if (dragSrc && dragSrc !== el) {
                        const p = el.parentNode;
                        const nodes = [...p.children];
                        const si = nodes.indexOf(dragSrc);
                        const ti = nodes.indexOf(el);
                        if (si < ti) p.insertBefore(dragSrc, el.nextSibling);
                        else p.insertBefore(dragSrc, el);
                        [...p.children].forEach((c, i) => {
                            const n = c.querySelector('.q-num');
                            if (n) n.textContent = i + 1;
                        });
                    }
                    el.classList.remove('drag-over');
                });
            });
        }

        async function saveOrder() {
            const items = document.querySelectorAll('#qList .q-item');
            const order = [...items].map((el, i) => ({ id: el.dataset.id, position: i + 1 }));
            try {
                await fetch('/api/queue/reorder', { method: 'PATCH', headers: auth(), body: JSON.stringify({ order }) });
            } catch { }
        }

        function moveItem(id, dir) {
            const list = document.getElementById('qList');
            const el = document.getElementById(`qi-${id}`);
            if (!el) return;
            if (dir === -1 && el.previousElementSibling) {
                list.insertBefore(el, el.previousElementSibling);
            } else if (dir === 1 && el.nextElementSibling) {
                list.insertBefore(el.nextElementSibling, el);
            }
            [...list.children].forEach((c, i) => {
                const n = c.querySelector('.q-num');
                if (n) n.textContent = i + 1;
            });
            saveOrder();
        }

        // ── ADD FORM ────────────────────────────────────────
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errEl = document.getElementById('addErr');
            const errTxt = document.getElementById('addErrTxt');
            errEl.classList.add('hidden');

            const projectName = document.getElementById('a-name').value.trim();
            const features = document.getElementById('a-feat').value.trim();
            const contact = document.getElementById('a-con').value.trim();

            if (!projectName || !features || !contact) {
                errTxt.textContent = 'กรุณากรอกข้อมูลที่มีดาวให้ครบ';
                errEl.classList.remove('hidden');
                return;
            }

            const btn = document.getElementById('addBtn');
            const txt = document.getElementById('addTxt');
            const icon = document.getElementById('addIcon');
            const spin = document.getElementById('addSpin');
            btn.disabled = true; txt.textContent = 'กำลังเพิ่ม...'; icon.classList.add('hidden'); spin.classList.remove('hidden');

            try {
                const r = await fetch('/api/queue/admin', {
                    method: 'POST', headers: auth(),
                    body: JSON.stringify({
                        projectName, features, contact,
                        nickname: document.getElementById('a-nick').value.trim(),
                        classroom: document.getElementById('a-class').value.trim(),
                        boardType: document.getElementById('a-board').value,
                        contactType: document.getElementById('a-ctype').value,
                        budget: document.getElementById('a-budget').value.trim(),
                        deadline: document.getElementById('a-dead').value,
                        notes: document.getElementById('a-notes').value.trim(),
                    })
                });
                const data = await r.json();
                if (!r.ok) throw new Error(data.message);
                document.getElementById('addForm').reset();
                toast('เพิ่มเข้าคิวแล้ว');
                loadStats();
            } catch (err) {
                errTxt.textContent = err.message;
                errEl.classList.remove('hidden');
            } finally {
                btn.disabled = false; txt.textContent = 'เพิ่มเข้าคิว'; icon.classList.remove('hidden'); spin.classList.add('hidden');
                lucide.createIcons();
            }
        });

        // ── HELPERS ─────────────────────────────────────────
        function toggleDet(id) {
            document.getElementById(id)?.classList.toggle('open');
        }
        function esc(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        function statusBadge(s) {
            const m = {
                approved: 'b-approved',
                waiting_parts: 'b-warning',
                in_progress: 'b-progress',
                done: 'b-done',
            };
            const labels = {
                approved: 'รอดำเนินการ',
                waiting_parts: 'รออุปกรณ์',
                in_progress: 'กำลังทำ',
                done: 'เสร็จ',
            };
            return `<span class="badge ${m[s] || 'b-pending'}">${labels[s] || s}</span>`;
        }
        function relTime(d) {
            const diff = Date.now() - new Date(d);
            const m = Math.floor(diff / 60000);
            if (m < 1) return 'เมื่อกี้';
            if (m < 60) return `${m}น. ที่แล้ว`;
            const h = Math.floor(m / 60);
            if (h < 24) return `${h}ชม. ที่แล้ว`;
            return `${Math.floor(h / 24)}วัน ที่แล้ว`;
        }

        // ── ANNOUNCEMENT ─────────────────────────────────────
        async function loadAnnouncement() {
            try {
                const r = await fetch('/api/announcement');
                const d = await r.json();
                const preview = document.getElementById('annPreview');
                const previewText = document.getElementById('annPreviewText');
                const clearBtn = document.getElementById('annClearBtn');
                const input = document.getElementById('annInput');
                if (d && d.text) {
                    previewText.textContent = d.text;
                    preview.style.display = 'flex';
                    clearBtn.style.display = '';
                    input.value = d.text;
                } else {
                    preview.style.display = 'none';
                    clearBtn.style.display = 'none';
                    input.value = '';
                }
                lucide.createIcons();
            } catch { }
        }

        async function postAnnouncement() {
            const text = document.getElementById('annInput').value.trim();
            if (!text) return;
            try {
                const r = await fetch('/api/announcement', {
                    method: 'POST', headers: auth(),
                    body: JSON.stringify({ text })
                });
                if (!r.ok) throw new Error();
                toast('ประกาศแล้ว');
                loadAnnouncement();
            } catch { toast('เกิดข้อผิดพลาด', false); }
        }

        async function clearAnnouncement() {
            try {
                await fetch('/api/announcement', { method: 'DELETE', headers: auth() });
                toast('ลบประกาศแล้ว');
                loadAnnouncement();
            } catch { toast('เกิดข้อผิดพลาด', false); }
        }

        // ── INIT ────────────────────────────────────────────
        loadStats();
        loadPending();
        loadAnnouncement();
        setInterval(loadStats, 30000);
        lucide.createIcons();
    </script>
</body>
