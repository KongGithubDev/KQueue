<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KQueue — จองคิวโครงงาน ESP32 / Arduino</title>
    <meta name="description" content="ส่งคำขอโครงงาน ESP32, Arduino, Raspberry Pi รอระบบอนุมัติคิวให้เองเลย" />
    <link rel="stylesheet" href="/style.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>

<body>

    <nav class="topbar">
        <a class="logo" href="/">
            KQueue
        </a>
        <a href="/login" class="topbar-link">
            <i data-lucide="lock" width="13" height="13"></i> Admin
        </a>
    </nav>

    <!-- ANNOUNCEMENT BANNER -->
    <div id="annBanner"
        style="display:none;background:#f59e0b18;border-bottom:1px solid #f59e0b30;padding:9px 20px;font-size:13px;color:var(--orange);display:none;align-items:center;gap:8px">
        <i data-lucide="megaphone" width="13" height="13"></i>
        <span id="annBannerText"></span>
    </div>

    <div class="wrap">
        <div class="hero">
            <h1>จองคิวทำโครงงาน</h1>
            <p>ESP32 · Arduino · Raspberry Pi</p>
        </div>

        <!-- FORM -->
        <div class="card" id="formSection">
            <div class="card-head">
                <div class="card-title">
                    <i data-lucide="clipboard-list" width="15" height="15"></i>
                    กรอกข้อมูลโครงงาน
                </div>
            </div>

            <form id="queueForm" novalidate>
                <div class="row2">
                    <div class="fg">
                        <label>ชื่อโครงงาน <span class="req">*</span></label>
                        <input id="projectName" type="text" placeholder="เช่น Smart Home, ระบบล็อคประตู" required />
                    </div>
                    <div class="fg">
                        <label>บอร์ดที่ใช้</label>
                        <select id="boardType">
                            <option value="ESP32">ESP32</option>
                            <option value="ESP8266">ESP8266</option>
                            <option value="Arduino">Arduino (Uno/Nano/Mega)</option>
                            <option value="Raspberry Pi">Raspberry Pi</option>
                            <option value="Other">อื่นๆ / ยังไม่แน่ใจ</option>
                        </select>
                    </div>
                </div>

                <div class="row2">
                    <div class="fg">
                        <label>ชื่อเล่น</label>
                        <input id="nickname" type="text" placeholder="เช่น ก้อง" />
                    </div>
                    <div class="fg">
                        <label>ห้องเรียน</label>
                        <input id="classroom" type="text" placeholder="เช่น ม.5/13" />
                    </div>
                </div>

                <div class="fg">
                    <label>อธิบายสิ่งที่อยากได้ <span class="req">*</span></label>
                    <textarea id="features" rows="4"
                        placeholder="บอกว่าอยากให้ระบบทำอะไร เช่น ตัวไหนต่อกับอะไร, ส่งข้อมูลไปไหน, แสดงผลยังไง"
                        required></textarea>
                </div>

                <div class="row2">
                    <div class="fg">
                        <label>ช่องทางติดต่อ</label>
                        <select id="contactType">
                            <option value="Instagram">Instagram</option>
                            <option value="Line">Line</option>
                            <option value="Facebook">Facebook</option>
                            <option value="Phone">โทรศัพท์</option>
                            <option value="Email">Email</option>
                            <option value="Other">อื่นๆ</option>
                        </select>
                    </div>
                    <div class="fg">
                        <label>Instagram ID / Line ID / เบอร์ / อีเมล <span class="req">*</span></label>
                        <input id="contact" type="text" placeholder="@username / Line ID / เบอร์" required />
                    </div>
                </div>

                <div class="row2">
                    <div class="fg">
                        <label>งบประมาณ (ถ้ามี)</label>
                        <input id="budget" type="text" placeholder="เช่น 300-500 บาท หรือต่อรองได้" />
                    </div>
                    <div class="fg">
                        <label>กำหนดส่ง (ถ้ามี)</label>
                        <input id="deadline" type="date" />
                    </div>
                </div>

                <div class="fg">
                    <label>หมายเหตุเพิ่มเติม</label>
                    <textarea id="notes" rows="2"
                        placeholder="อะไรก็ได้ที่อยากบอกเพิ่ม เช่น มีอุปกรณ์อยู่แล้ว, มีตัวอย่างอยู่แล้ว"></textarea>
                </div>

                <div id="formErr" class="err-msg hidden">
                    <i data-lucide="alert-circle" width="13" height="13"></i>
                    <span id="formErrText"></span>
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">
                    <i data-lucide="send" width="14" height="14" id="submitIcon"></i>
                    <span id="submitText">ส่งคำขอ</span>
                    <span id="submitSpinner" class="spinner hidden"></span>
                </button>
            </form>
        </div>

        <!-- SUCCESS -->
        <div class="card hidden" id="successSection">
            <div class="success-box">
                <i data-lucide="check-circle-2" width="40" height="40"></i>
                <h2 style="margin-bottom:6px;font-size:18px">รับแล้ว!</h2>
                <p style="color:var(--text-2);font-size:13px">ได้รับคำขอของคุณแล้ว<br />ดูสถานะคิวได้ด้านล่าง</p>
                <button class="btn btn-ghost mt2" onclick="resetForm()">
                    <i data-lucide="plus" width="13" height="13"></i> ส่งอีกอัน
                </button>
            </div>
        </div>

        <!-- PUBLIC QUEUE -->
        <div
            style="margin-top:28px; margin-bottom:8px; display:flex; align-items:center; justify-content:space-between;">
            <h2 style="font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px;">
                <i data-lucide="list-ordered" width="16" height="16" style="color:var(--text-2)"></i>
                คิวตอนนี้
            </h2>
            <button class="btn btn-ghost btn-sm" onclick="loadPublicQueue()">
                <i data-lucide="refresh-cw" width="12" height="12"></i> รีเฟรช
            </button>
        </div>

        <div class="card" style="padding:0;overflow:hidden">
            <div id="pubLoad" style="padding:28px;text-align:center;">
                <div class="spinner" style="border-color:#6366f120;border-top-color:var(--accent);margin:0 auto"></div>
            </div>
            <div id="pubEmpty" class="empty hidden">
                <i data-lucide="inbox" width="28" height="28"></i>
                <p>ว่างอยู่นะ จองได้เลย</p>
            </div>
            <table class="qtable" id="pubTable" style="display:none">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>ชื่อโครงงาน</th>
                        <th>บอร์ด</th>
                        <th>สถานะ</th>
                        <th>วันที่</th>
                    </tr>
                </thead>
                <tbody id="pubBody"></tbody>
            </table>
        </div>
    </div>

    <div class="toast-wrap" id="toastWrap"></div>

    <script>
        const API = '/api';

        document.getElementById('queueForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errEl = document.getElementById('formErr');
            const errTxt = document.getElementById('formErrText');
            errEl.classList.add('hidden');

            const projectName = document.getElementById('projectName').value.trim();
            const features = document.getElementById('features').value.trim();
            const contact = document.getElementById('contact').value.trim();

            if (!projectName || !features || !contact) {
                errTxt.textContent = 'กรุณากรอกข้อมูลที่มีดาวให้ครบ';
                errEl.classList.remove('hidden');
                return;
            }

            const btn = document.getElementById('submitBtn');
            const txt = document.getElementById('submitText');
            const icon = document.getElementById('submitIcon');
            const spinner = document.getElementById('submitSpinner');
            btn.disabled = true;
            txt.textContent = 'กำลังส่ง...';
            icon.classList.add('hidden');
            spinner.classList.remove('hidden');

            try {
                const res = await fetch(`${API}/queue`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        projectName, features, contact,
                        nickname: document.getElementById('nickname').value.trim(),
                        classroom: document.getElementById('classroom').value.trim(),
                        boardType: document.getElementById('boardType').value,
                        contactType: document.getElementById('contactType').value,
                        budget: document.getElementById('budget').value.trim(),
                        deadline: document.getElementById('deadline').value,
                        notes: document.getElementById('notes').value.trim(),
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'เกิดข้อผิดพลาด');
                document.getElementById('formSection').classList.add('hidden');
                document.getElementById('successSection').classList.remove('hidden');
                loadPublicQueue();
                lucide.createIcons();
            } catch (err) {
                errTxt.textContent = err.message;
                errEl.classList.remove('hidden');
                btn.disabled = false;
                txt.textContent = 'ส่งคำขอ';
                icon.classList.remove('hidden');
                spinner.classList.add('hidden');
                lucide.createIcons();
            }
        });

        function resetForm() {
            document.getElementById('queueForm').reset();
            document.getElementById('formSection').classList.remove('hidden');
            document.getElementById('successSection').classList.add('hidden');
            lucide.createIcons();
        }

        async function loadPublicQueue() {
            const load = document.getElementById('pubLoad');
            const empty = document.getElementById('pubEmpty');
            const table = document.getElementById('pubTable');
            const body = document.getElementById('pubBody');
            load.classList.remove('hidden');
            empty.classList.add('hidden');
            table.style.display = 'none';

            try {
                const res = await fetch(`${API}/queue/public`);
                const data = await res.json();
                load.classList.add('hidden');
                if (!data.length) { empty.classList.remove('hidden'); return; }
                table.style.display = 'table';
                body.innerHTML = data.map((item, i) => `
      <tr>
        <td style="color:var(--text-3);font-size:12px">${i + 1}</td>
        <td style="font-weight:500">${esc(item.projectName)}</td>
        <td style="color:var(--text-2)">${esc(item.boardType)}</td>
        <td>${statusBadge(item.status)}</td>
        <td style="color:var(--text-3);font-size:12px">${new Date(item.createdAt).toLocaleDateString('th-TH')}</td>
      </tr>
    `).join('');
            } catch {
                load.classList.add('hidden');
                empty.classList.remove('hidden');
            }
        }

        function statusBadge(s) {
            const m = {
                approved: ['b-approved', 'รอดำเนินการ'],
                waiting_parts: ['b-warning', 'รออุปกรณ์'],
                hardware_issue: ['b-error', 'ปัญหาอุปกรณ์'],
                in_progress: ['b-progress', 'กำลังทำ'],
                done: ['b-done', 'เสร็จแล้ว'],
            };
            const [cls, lbl] = m[s] || ['b-pending', s];
            return `<span class="badge ${cls}">${lbl}</span>`;
        }

        function esc(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        async function loadAnnouncement() {
            try {
                const r = await fetch('/api/announcement');
                const d = await r.json();
                const banner = document.getElementById('annBanner');
                const txt = document.getElementById('annBannerText');
                if (d && d.text) {
                    txt.textContent = d.text;
                    banner.style.display = 'flex';
                    lucide.createIcons();
                } else {
                    banner.style.display = 'none';
                }
            } catch { }
        }

        loadPublicQueue();
        loadAnnouncement();
        lucide.createIcons();
    </script>
</body>

</html>
